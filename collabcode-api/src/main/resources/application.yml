spring:
  application:
    name: collabcode-api
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/collabcode_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

app:
  security:
    # This is a Base64 encoded 256-bit key
    jwt-secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    # 24 hours in milliseconds (1000 * 60 * 60 * 24)
    jwt-expiration: 86400000